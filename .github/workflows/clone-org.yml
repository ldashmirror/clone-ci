name: Sync GitHub Org

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate GH CLI
        run: echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token

      - name: Sync repos
        run: |
          SRC_ORG="lightdash"
          DEST_ORG="ldashmirror"
          GH_TOKEN="${{ secrets.GH_TOKEN }}"

          repos=$(gh repo list $SRC_ORG --limit 1000 --json name -q '.[].name')

          for repo in $repos; do
            echo "Syncing $repo"

            git clone --mirror https://github.com/$SRC_ORG/$repo.git
            cd $repo.git

            gh repo create $DEST_ORG/$repo --private || true

            git push --mirror https://x-access-token:$GH_TOKEN@github.com/$DEST_ORG/$repo.git

            cd ..
            rm -rf $repo.git
          done
